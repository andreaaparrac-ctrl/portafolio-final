<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fuente de Vida - Iniciar Sesion</title>
    <style>
        body {
            background-color: #e3f2fd; /* Fondo celeste claro oficial */
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background-color: #212529; /* Gris oscuro corporativo */
            color: white;
            border: 1px solid #495057;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }
        .login-card h2 {
            color: #0dcaf0; /* Celeste brillante */
            margin: 0 0 0.5rem 0;
            font-weight: bold;
        }
        .login-card p {
            color: #adb5bd;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            color: #adb5bd;
            font-size: 0.875rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .form-control {
            width: 100%;
            padding: 0.65rem;
            background-color: #2b3035;
            border: 1px solid #495057;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #0dcaf0;
            box-shadow: 0 0 0 2px rgba(13, 202, 240, 0.25);
        }
        .btn-submit {
            background-color: #0dcaf0;
            color: white;
            border: none;
            width: 100%;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #0a98b5;
        }
        .login-footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #adb5bd;
        }
        .login-footer a {
            color: #0dcaf0;
            text-decoration: none;
            font-weight: bold;
        }
        .login-footer a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }
        .alert-danger {
            background-color: #721c24;
            color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .alert-info {
            background-color: #0c5460;
            color: #d1ecf1;
            border: 1px solid #bee5eb;
        }
        .alert-success {
            background-color: #155724;
            color: #d4edda;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>💧 Fuente de Vida</h2>
        <p>Identificate para gestionar tu carrito</p>

        <!-- Alertas de Spring Security -->
        <div th:if="${param.error}" class="alert alert-danger">
            Correo o contraseña incorrectos.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            Sesion cerrada correctamente.
        </div>
        <div th:if="${param.success}" class="alert alert-success">
            ¡Registro completado! Ya puedes iniciar sesion.
        </div>

        <form th:action="@{/login}" method="POST">
            <div class="form-group">
                <label for="username">Correo Electronico</label>
                <input type="email" id="username" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="contrasenia" class="form-control" placeholder="******" required>
            </div>
            
            <button type="submit" class="btn-submit">Iniciar Sesion</button>
        </form>

        <div class="login-footer">
            ¿No tienes una cuenta? <a th:href="@{/register}">Registrate aqui</a>
        </div>
    </div>

</body>
</html>
