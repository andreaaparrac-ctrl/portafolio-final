<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fuente de Vida - Crear Cuenta</title>
    <style>
        body {
            background-color: #e3f2fd; /* Fondo celeste claro oficial */
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .register-card {
            background-color: #212529; /* Gris oscuro corporativo */
            color: white;
            border: 1px solid #495057;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
        }
        .register-card h2 {
            color: #0dcaf0; /* Celeste brillante */
            margin: 0 0 0.5rem 0;
            font-weight: bold;
        }
        .register-card p {
            color: #adb5bd;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .fila-doble {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 1.25rem;
            flex: 1;
        }
        .form-group label {
            display: block;
            color: #adb5bd;
            font-size: 0.875rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .form-control {
            width: 100%;
            padding: 0.65rem;
            background-color: #2b3035;
            border: 1px solid #495057;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-control:focus {
            outline: none;
            border-color: #0dcaf0;
            box-shadow: 0 0 0 2px rgba(13, 202, 240, 0.25);
        }
        .btn-submit {
            background-color: #0dcaf0;
            color: white;
            border: none;
            width: 100%;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #0a98b5;
        }
        .register-footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #adb5bd;
        }
        .register-footer a {
            color: #0dcaf0;
            text-decoration: none;
            font-weight: bold;
        }
        .register-footer a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
            font-weight: bold;
            background-color: #721c24;
            color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>📝 Crear Cuenta</h2>
        <p>Únete para gestionar tus pedidos de agua purificada</p>

        <!-- Muestra alertas si el controlador detecta errores -->
        <div th:if="${error}" class="alert" th:text="${error}"></div>

        <!-- El formulario se enlaza al objeto usuario definido en el AuthController -->
        <form th:action="@{/register}" th:object="${usuario}" method="POST">
            
            <div class="fila-doble">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required placeholder="Juan">
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" th:field="*{apellido}" class="form-control" required placeholder="Pérez">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" th:field="*{email}" class="form-control" required placeholder="ejemplo@correo.com">
            </div>
            
            <div class="form-group">
                <label for="contrasenia">Contraseña</label>
                <input type="password" id="contrasenia" th:field="*{contrasenia}" class="form-control" required placeholder="Mínimo 6 caracteres">
            </div>
            
            <button type="submit" class="btn-submit">Registrarme e Ingresar</button>
        </form>

        <div class="register-footer">
            ¿Ya tienes una cuenta? <a th:href="@{/login}">Inicia sesión aquí</a>
        </div>
    </div>

</body>
</html>
